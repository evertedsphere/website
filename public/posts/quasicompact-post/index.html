<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="shortcut icon" href="./assets/img/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="76x76"
      f="./assets/img/apple-icon.png"
    />
    <link
      rel="stylesheet"
      f="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    
    
    
    
    <link

    <title>Quasicompact Post &mdash; Mesocosmos</title>

  <body class="text-gray-400 antialiased viewport">
    <nav class="relative bg-gray-900
                pt-4 md:pt-4 lg:pt-5 xl:pt-6 
                pb-8 sm:pb-10 md:pb-10 lg:pb-12 xl:pb-16">

            </p>
          </div>
          <div class="hidden md:block lg:block xl:block md:w-5/12 lg:w-5/12 xl:w-5/12">
            <div class="search-parent relative">
              <input class="bg-gray-800 appearance-none border-2
                            border-gray-900 rounded w-full py-2 px-4
                            text-gray-400 leading-tight focus:outline-none
                            focus:border-indigo-500"
                     id="inline-full-name" type="text" value="" 
                     placeholder="enter search">
            </div>
          </div>
        </div>
      </div>
    </nav>

    <section
      class="relative block bg-gray-800 leader-section even-section 
              pt-2 sm:pt-2 md:pt-2 lg:pt-0 xl:pt-0 
              pb-10 sm:pb-16 md:pb-16 lg:pb-24 xl:pb-24"
    >
      <div class="container mx-auto px-4">
        <div class="flex flex-wrap md:justify-around lg:justify-around xl:justify-around">
          <div class="w-full md:w-7/12 lg:w-7/12 xl:w-7/12">

<div class="block">

<span class="mr-1 pr-1 italic">
previous
</span>
<a
  href='http://0.0.0.0:8000/posts/smooth-post/'
  class="m-1 p-1 font-semibold"
>Smooth Post</a>

</div>

<h1 id="title" class="text-4xl pt-2 pb-6 font-semibold">Quasicompact Post</h1>

<aside class="meta">

<div class="block">
<span class="italic mr-1 pr-1 semibold">
published
</span>
<span class="m-1 p-1 font-semibold">
Wed Mar 25, 2020
</span>
</div>

<div class="block">

</div>

</aside>

          </div>
          <div class="invisible md:visible lg:visible xl:visible md:w-5/12 lg:w-5/12 xl:w-5/12 px-10">

<div class="block">

</div>


          </div>
        </div>
      </div>
    </section>

    <section class="relative block bg-gray-900 post-leader-section
      odd-section fill-viewport
      pt-5 sm:pt-0 md:pt-0 lg:pt-0 xl:pt-0 
      pb-5 sm:pt-0 md:pb-0 lg:pb-0 xl:pb-0">
      <div class="container mx-auto px-4">
        <div class="flex flex-wrap md:justify-around lg:justify-around xl:justify-around">
          <div class="w-full md:w-7/12 lg:w-7/12 xl:w-7/12 actual-content">
<article id="content">
  
</article>

          </div>
          <div class="invisible md:visible lg:visible xl:visible md:w-5/12 lg:w-5/12 xl:w-5/12 px-10">
Sidebar content.

          </div>
        </div>
      </div>

    <footer class="relative bg-gray-800 text-gray-500
                    pt-10 sm:pt-10 md:pt-16 lg:pt-16 xl:pt-20

          <div class="w-full md:w-7/12 lg:w-7/12 xl:w-7/12">
            <p class="text-md">
              <a href="https://github.com/evertedspheres/website"
                 class="underline">Built</a> using org-roam and Hugo.

          <div class="invisible md:visible lg:visible xl:visible md:w-5/12 lg:w-5/12 xl:w-5/12 px-10">
            
          </div>
